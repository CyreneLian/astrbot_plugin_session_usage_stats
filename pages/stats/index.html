<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>模型用量统计 · 仪表盘</title>
<style>
:root{
  --bg:#fff;
  --surface:#fff;
  --fg:#1f1f1f;
  --muted:rgba(31,31,31,.68);
  --subtle:rgba(31,31,31,.56);
  --border:rgba(31,31,31,.10);
  --border-strong:rgba(31,31,31,.14);
  --soft:rgba(25,118,210,.08);
  --soft-strong:rgba(25,118,210,.14);
  --primary:#1976d2;
  --primary2:#42a5f5;
  --accent:#7e57c2;
  --warn:#ed6c02;
  --danger:#d32f2f;
  --chip:rgba(25,118,210,.08);
  --table:#fafafa;
  --shadow:none;
}
[data-theme=dark]{
  --bg:#121212;
  --surface:#1e1e1e;
  --fg:#f5f5f5;
  --muted:rgba(245,245,245,.70);
  --subtle:rgba(245,245,245,.58);
  --border:rgba(245,245,245,.14);
  --border-strong:rgba(245,245,245,.18);
  --soft:rgba(144,202,249,.12);
  --soft-strong:rgba(144,202,249,.20);
  --primary:#90caf9;
  --primary2:#64b5f6;
  --accent:#b39ddb;
  --warn:#ffb74d;
  --danger:#ef5350;
  --chip:rgba(144,202,249,.12);
  --table:#242424;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:"SF Pro Display","SF Pro Text",Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--fg);
  padding:24px;
}
.shell{max-width:1560px;margin:0 auto}
.hero{display:flex;gap:24px;align-items:flex-end;justify-content:space-between;margin-bottom:24px}
.title h1{margin:0;font-size:1.5rem;line-height:1.2;font-weight:700;letter-spacing:0;color:var(--fg)}
.title p{margin:4px 0 0;color:var(--muted);font-size:.875rem;line-height:1.55}
.actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;font-size:13px;background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.badge.ok{color:#2e7d32}.badge.err{color:var(--danger)}.badge.loading{color:var(--primary)}
.btn,.tab{border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:999px;padding:9px 14px;cursor:pointer;transition:background-color .18s ease,color .18s ease,border-color .18s ease;box-shadow:none;font-size:13px;font-weight:600;line-height:1.2}
.btn:hover,.tab:hover{background:var(--soft);color:var(--primary);border-color:var(--border-strong)}
.btn.primary,.tab.on{background:var(--soft);color:var(--primary);border-color:var(--border)}
.btn.danger{color:var(--danger);background:rgba(211,47,47,.08);border-color:rgba(211,47,47,.18)}
.btn.danger:hover{background:rgba(211,47,47,.14)}
.tabs{display:inline-flex;gap:8px;flex-wrap:wrap;margin:0 0 20px;padding:6px;border:1px solid var(--border);border-radius:999px;background:var(--surface)}
.mini-switch{display:inline-flex;flex:0 0 auto;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:5px;margin-left:8px;vertical-align:middle;box-sizing:border-box}
.mini-switch button{border:0;background:transparent;color:var(--muted);border-radius:999px;padding:7px 12px;min-width:54px;text-align:center;font-size:12px;font-weight:600;line-height:1.2;cursor:pointer;box-sizing:border-box;transition:background-color .18s ease,color .18s ease}
#modelScopeSwitch{width:180px;justify-content:center}
#modelScopeSwitch button{width:82px;min-width:82px}
#modelMetricSwitch{width:142px;justify-content:center}
#modelMetricSwitch button{width:62px;min-width:62px}
.table-sort{margin-left:0}
.table-sort button{min-width:72px}
.mini-switch button.on{background:var(--soft);color:var(--primary)}
.grid{display:grid;gap:16px}
.cards{grid-template-columns:repeat(5,minmax(150px,1fr));margin-bottom:20px}
.card,.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow)}
.card{padding:20px 20px 18px;position:relative;overflow:hidden;animation:fadeLift .46s cubic-bezier(.2,.75,.25,1) both}
.card:after{display:none}
.card .lab{font-size:13px;font-weight:500;color:var(--muted)}
.card .val{font-size:clamp(24px,2vw,34px);font-weight:700;letter-spacing:-.03em;margin-top:8px;line-height:1.1;color:var(--fg)}
.card .hint{margin-top:8px;font-size:12px;line-height:1.5;color:var(--subtle)}
.card:nth-child(1){animation-delay:.02s}.card:nth-child(2){animation-delay:.06s}.card:nth-child(3){animation-delay:.10s}.card:nth-child(4){animation-delay:.14s}.card:nth-child(5){animation-delay:.18s}
.layout{grid-template-columns:1.6fr .9fr;gap:20px;align-items:stretch}
.layout>*{min-width:0;width:100%}
.panel{padding:22px;min-width:0}
.panel h3{margin:0 0 18px;font-size:19px;font-weight:650;letter-spacing:-.02em;line-height:1.3;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;color:var(--fg)}
.panel h3 .mini-switch{justify-self:center}
.panel h3 small{justify-self:end;font-size:12px;font-weight:500;color:var(--subtle);white-space:nowrap}
.panel h3.model-title{grid-template-columns:minmax(360px,1fr) minmax(180px,1fr);column-gap:24px;position:relative}
.panel h3.model-title .model-title-text{grid-column:1;grid-row:1;justify-self:start;align-self:center}
.panel h3.model-title .model-switches{grid-column:1;grid-row:1;justify-self:center;display:inline-flex;align-items:center;gap:64px;min-width:386px;transform:translateX(144px)}
.panel h3.model-title #modelScopeSwitch,.panel h3.model-title #modelMetricSwitch{margin-left:0}
.panel h3.model-title small{grid-column:2;grid-row:1;justify-self:end}
.wide{grid-column:1/-1}
.chart{height:280px;position:relative}.chart.small{height:240px}
.empty{padding:56px 0;text-align:center;color:var(--muted);font-size:14px}
.bars{display:flex;flex-direction:column;gap:12px}
.bar-row{display:grid;grid-template-columns:minmax(120px,1fr) 3fr 90px;gap:12px;align-items:center;font-size:14px;padding:10px 0;border-bottom:1px solid var(--border)}
.bar-row:last-child{border-bottom:0}
.sid{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--fg)}
.track{height:10px;background:var(--soft);border-radius:999px;overflow:hidden}
.fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--primary),var(--primary2));transform-origin:left center;animation:barGrow .62s cubic-bezier(.2,.8,.2,1) both}
.num{text-align:right;color:var(--muted);font-variant-numeric:tabular-nums;font-size:13px}
.donut-wrap{display:grid;grid-template-columns:210px 1fr;gap:18px;align-items:center;animation:fadeLift .42s ease both}
.donut{width:210px;height:210px;border-radius:50%;background:conic-gradient(var(--primary) 0deg 0deg);position:relative;margin:auto;animation:donutReveal 1.2s cubic-bezier(.2,.75,.25,1) both}
.donut:after{content:"";position:absolute;inset:42px;border-radius:50%;background:var(--surface);border:1px solid var(--border);animation:innerPulse 1.2s ease both}
.donut.donut-svg-wrap{background:transparent;overflow:visible}
.donut.donut-svg-wrap:after{display:none}
.donut-svg{display:block;width:100%;height:100%;overflow:visible}
.donut-arc{opacity:1;transform-origin:105px 105px;animation:arcFade .85s ease both}
.donut-reveal-stroke{stroke-dasharray:var(--donut-circ);stroke-dashoffset:var(--donut-circ);animation:donutSweep 1.45s cubic-bezier(.2,.75,.25,1) both}
@keyframes arcFade{from{opacity:0}to{opacity:1}}
@keyframes donutSweep{to{stroke-dashoffset:0}}
.legend{display:flex;flex-direction:column;gap:0}
.legend-item{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted);padding:10px 0;border-bottom:1px solid var(--border);animation:fadeSlide .42s ease both}
.legend-item:last-child{border-bottom:0}
.legend-item b{color:var(--fg);font-weight:650}
.dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.platform-summary{margin-top:12px;padding:14px;border:1px solid var(--border);border-radius:14px;background:linear-gradient(180deg,var(--soft),rgba(255,255,255,.42));box-shadow:inset 0 1px 0 rgba(255,255,255,.45);animation:fadeLift .48s ease both}
.platform-summary .headline{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.platform-summary .label{font-size:12px;color:var(--subtle)}
.platform-summary .main{font-size:18px;font-weight:700;color:var(--fg);letter-spacing:-.02em;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.platform-summary .share{font-size:18px;font-weight:750;color:var(--primary);font-variant-numeric:tabular-nums}
.platform-summary .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.platform-summary .stat{padding:10px 12px;border-radius:12px;background:var(--surface);border:1px solid var(--border)}
.platform-summary .stat span{display:block;font-size:11px;color:var(--subtle);margin-bottom:4px}
.platform-summary .stat b{font-size:14px;color:var(--fg);font-variant-numeric:tabular-nums}
.platform-summary .tip{margin-top:10px;font-size:12px;line-height:1.55;color:var(--muted)}
[data-theme=dark] .platform-summary{background:linear-gradient(180deg,var(--soft),rgba(15,23,42,.24));box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.spark{width:100%;height:100%}
.trend-wrap{position:relative;height:100%;border-radius:14px;overflow:hidden}
.trend-tip{position:absolute;z-index:5;pointer-events:none;transform:translate(-50%,-112%);padding:8px 10px;border:1px solid var(--border);border-radius:12px;background:var(--surface);color:var(--fg);box-shadow:0 10px 26px rgba(15,23,42,.10);font-size:12px;line-height:1.45;white-space:nowrap;opacity:0;transition:opacity .14s ease}
.trend-tip b{font-size:13px}
.trend-hit{cursor:crosshair}
.trend-hit:hover + .trend-dot{r:5;opacity:1}
.trend-dot{opacity:.68;transition:opacity .14s ease;animation:dotPop .42s ease both}
.trend-area{animation:areaRise .72s ease both}
.trend-line{stroke-dasharray:1;stroke-dashoffset:1;animation:lineDraw .92s cubic-bezier(.2,.8,.2,1) .08s both}
.trend-mark{animation:dotPop .48s ease .55s both}
[data-theme=dark] .trend-tip{box-shadow:0 12px 30px rgba(0,0,0,.28)}
tbody tr{animation:fadeSlide .34s ease both}
@keyframes fadeLift{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlide{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes barGrow{from{transform:scaleX(0);opacity:.55}to{transform:scaleX(1);opacity:1}}
@keyframes donutReveal{from{opacity:.35;transform:rotate(-18deg) scale(.94);clip-path:circle(8% at 50% 50%)}to{opacity:1;transform:rotate(0) scale(1);clip-path:circle(72% at 50% 50%)}}
@keyframes innerPulse{from{transform:scale(.86);opacity:.72}to{transform:scale(1);opacity:1}}
@keyframes areaRise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes lineDraw{to{stroke-dashoffset:0}}
@keyframes dotPop{from{opacity:0;transform:scale(.45)}to{opacity:.92;transform:scale(1)}}
@media (prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}
.table-tools{display:flex;gap:12px;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.input{border:1px solid var(--border);background:var(--surface);color:var(--fg);border-radius:999px;padding:10px 14px;min-width:260px;font-size:13px;outline:none;transition:border-color .18s ease,background-color .18s ease}
.input:focus{border-color:var(--primary);background:var(--soft)}
.table-wrap{overflow:auto;max-height:494px;border:1px solid var(--border);border-radius:16px;background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface)}
th{position:sticky;top:0;background:var(--table);color:var(--muted);font-weight:650;text-align:left;padding:13px 14px;white-space:nowrap;border-bottom:1px solid var(--border);z-index:3;backdrop-filter:saturate(140%) blur(6px);box-shadow:0 6px 12px -10px rgba(15,23,42,.18)}
td{padding:13px 14px;border-top:1px solid var(--border);white-space:nowrap;color:var(--fg)}
tbody tr:first-child td{border-top:0}
tr:hover td{background:var(--soft)}
td.right,th.right{text-align:right}
.pager{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:12px;color:var(--muted);font-size:12px}
.watermark{margin:18px 0 0;text-align:center;color:var(--subtle);font-size:12px}
/* Top 会话固定为前 10 条：恢复舒展比例，增高卡片避免溢出 */
#topBars.chart.small{
  height:360px;
  min-height:360px;
  overflow:hidden;
}
/* 模型占比卡片：保持原来的 240px 高度，仅让名称区上下滚动 */
#modelDonut.chart.small{
  height:240px;
  min-height:240px;
  max-height:240px;
  overflow:hidden;
}
#modelDonut .donut-wrap{
  height:100%;
  min-height:0;
  align-items:center;
}
#modelDonut .legend{
  max-height:220px;
  overflow-y:auto;
  overflow-x:hidden;
  padding-right:6px;
  scrollbar-width:thin;
  scrollbar-color:rgba(148,163,184,.45) transparent;
}
#modelDonut .legend::-webkit-scrollbar{width:6px}
#modelDonut .legend::-webkit-scrollbar-thumb{background:rgba(148,163,184,.45);border-radius:999px}
#modelDonut .legend::-webkit-scrollbar-thumb:hover{background:rgba(148,163,184,.7)}
#modelDonut .legend::-webkit-scrollbar-track{background:transparent}
#modelDonut .legend-item{flex-shrink:0}
#modelDonut .legend-item.has-others{cursor:default;position:relative}
#modelDonut .legend-item.has-others:hover{background:var(--soft);border-radius:6px}
#modelDonut .others-hint{color:var(--subtle);font-size:10px;margin-left:2px;transition:color .15s}
#modelDonut .legend-item.has-others:hover .others-hint{color:var(--primary)}
#topBars .bars{
  height:100%;
  display:flex;
  flex-direction:column;
  gap:0;
}
#topBars .bar-row{
  grid-template-columns:150px minmax(260px,1fr) 150px;
  gap:14px;
  padding:9px 0;
  min-width:0;
}
#topBars .sid-cell,
#topBars .track,
#topBars .num{
  min-width:0;
}
#topBars .sid{
  display:block;
  width:100%;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  color:var(--fg);
  cursor:ew-resize;
  padding-bottom:3px;
  scrollbar-width:thin;
  scrollbar-color:transparent transparent;
  transition:color .2s, scrollbar-color .2s;
}
#topBars .sid:hover,
#topBars .sid:focus{
  overflow-x:auto;
  overflow-y:hidden;
  text-overflow:clip;
  color:var(--primary);
  outline:none;
  scrollbar-color:rgba(148,163,184,.55) transparent;
}
#topBars .sid::-webkit-scrollbar{height:6px}
#topBars .sid::-webkit-scrollbar-thumb{background:transparent;border-radius:999px}
#topBars .sid:hover::-webkit-scrollbar-thumb,
#topBars .sid:focus::-webkit-scrollbar-thumb{background:rgba(148,163,184,.55)}
#topBars .sid::-webkit-scrollbar-track{background:transparent}
#topBars .track{
  height:12px;
}
#topBars .num{
  width:150px;
  max-width:none;
  overflow:visible;
  text-overflow:clip;
  white-space:nowrap;
  text-align:right;
  font-variant-numeric:tabular-nums;
}
@media(max-width:1180px){
  #topBars .bar-row{grid-template-columns:150px minmax(180px,1fr) 132px;gap:10px}
  #topBars .num{width:132px}
}
@media(max-width:760px){
  #topBars .bar-row{grid-template-columns:minmax(0,1fr);gap:6px}
  #topBars .num{width:auto;text-align:left}
}

@media(max-width:1400px){.cards{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:1080px){
  .layout{grid-template-columns:1fr}
  .donut-wrap{grid-template-columns:1fr;gap:24px}
  .bar-row{grid-template-columns:1fr}
  .num{text-align:left}
  .hero{align-items:flex-start;flex-direction:column}
  .actions{width:100%}
  #modelDonut.chart.small,#platformDonut.chart.small{height:auto;min-height:0;max-height:none;overflow:visible}
  #modelDonut .legend{max-height:none;overflow:visible}
  .donut{margin:0 auto}
  .panel h3.model-title{display:flex;flex-direction:column;align-items:flex-start;gap:12px;grid-template-columns:none}
  .panel h3.model-title .model-switches{position:static;transform:none;justify-content:flex-start;flex-wrap:wrap;gap:12px;min-width:0;width:100%}
  .panel h3.model-title small{align-self:flex-start}
}
@media(max-width:900px){.cards{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:560px){body{padding:16px}.cards{grid-template-columns:1fr}.title h1{font-size:1.35rem}.panel{padding:18px}.input{min-width:100%;width:100%}.tabs{display:flex;border-radius:18px}.tab{flex:1}.panel h3{display:flex;align-items:flex-start;flex-direction:column}.panel h3 .mini-switch{justify-self:auto}.panel h3 small{justify-self:auto}.mini-switch{margin-left:0}}
.top-loader{position:fixed;top:0;left:0;right:0;height:3px;z-index:9999;background:transparent;pointer-events:none;overflow:hidden}
.top-loader::before{content:"";display:block;height:100%;width:40%;background:linear-gradient(90deg,transparent,var(--primary,#6366f1),transparent);transform:translateX(-100%);transition:opacity .25s}
body.is-loading .top-loader::before{animation:loaderSlide 1.1s ease-in-out infinite}
body.is-loading .panel,body.is-loading .card{opacity:.55;transition:opacity .2s}
body:not(.is-loading) .panel,body:not(.is-loading) .card{transition:opacity .2s}
@keyframes loaderSlide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
</style>
</head>
<body>
<div class="top-loader" id="topLoader"></div>
<div class="shell">
  <div class="hero">
    <div class="title">
      <h1>模型用量统计仪表盘</h1>
      <p id="subtitle">把散落的模型调用、次数与 Token，整理成一张更清楚的星图。</p>
    </div>
    <div class="actions">
      <span class="badge loading" id="status">准备中...</span>
      <button class="btn" id="btn-refresh">刷新</button>
      <button class="btn danger" id="btn-clear">清空数据</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" data-t="day">过去24小时</button>
    <button class="tab" data-t="week">过去7天</button>
    <button class="tab" data-t="month">过去30天</button>
  </div>

  <div id="summary" class="grid cards"></div>

  <div class="grid layout">
    <section class="panel">
      <h3>Top 会话 <span class="mini-switch" id="topMetricSwitch"><button class="on" data-m="total_tokens">Token</button><button data-m="round_count">轮数</button></span> <small id="topHint">默认前 10</small></h3>
      <div id="topBars" class="chart small"></div>
    </section>
    <section class="panel">
      <h3>平台占比 <span class="mini-switch" id="platformMetricSwitch"><button class="on" data-m="total_tokens">Token</button><button data-m="round_count">轮数</button></span></h3>
      <div id="platformDonut" class="chart small"></div>
    </section>
    <section class="panel wide">
      <h3 class="model-title"><span class="model-title-text">模型占比</span><span class="model-switches"><span class="mini-switch" id="modelScopeSwitch"><button class="on" data-s="chat">对话模型</button><button data-s="all">全部模型</button></span><span class="mini-switch" id="modelMetricSwitch"><button class="on" data-m="total_tokens">Token</button><button data-m="call_count">次数</button></span></span><small id="modelHint">按模型聚合</small></h3>
      <div id="modelDonut" class="chart small"></div>
    </section>
    <section class="panel wide">
      <h3>趋势概览 <span class="mini-switch" id="trendMetricSwitch"><button class="on" data-m="total_tokens">Token</button><button data-m="round_count">轮数</button></span> <small id="trendHint">最近周期</small></h3>
      <div id="trend" class="chart"></div>
    </section>
    <section class="panel wide">
      <h3>明细表格 <small id="tableHint"></small></h3>
      <div class="table-tools">
        <input class="input" id="search" placeholder="搜索平台或会话 ID..."/>
        <div class="mini-switch table-sort" id="tableSortSwitch" title="再次点击当前排序项可切换升序/降序">
          <button class="on" data-sort="total_tokens">Token ↓</button>
          <button data-sort="round_count">轮数</button>
        </div>
      </div>
      <div class="table-wrap"><table id="table"></table></div>
    </section>
  </div>
  <div class="watermark">轻量 SVG/CSS 图表 · Top N 与表格滚动保护 · 关闭页面后前端图表内存会被浏览器回收</div>
</div>
<script src="/api/plugin/page/bridge-sdk.js"></script>
<script>
const bridge = window.AstrBotPluginPage;
let currentTab='day', rows=[], trendRows=[], modelRows=[], allModelRows=[], query='', platformMetric='total_tokens', modelMetric='total_tokens', modelScope='chat', topMetric='total_tokens', trendMetric='total_tokens', tableSortMetric='total_tokens', tableSortDir='desc';
const modelStatsCache=new Map();
const dataCache=new Map();
function modelCacheKey(tab,scope){return `${tab}:${scope}`}
const colors=['#8f9eff','#74d8c3','#f7a8c8','#ffd071','#7fc7f5','#bea6ff','#8dde9e','#ffbd7a','#ee98bd','#72cddd'];
function $(id){return document.getElementById(id)}
function fmt(n){return Number(n||0).toLocaleString()}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function status(t,c){const e=$('status');e.textContent=t;e.className='badge '+c}
function sum(a,k){return a.reduce((s,r)=>s+Number(r[k]||0),0)}
function tabName(t){return t==='day'?'过去24小时':t==='week'?'过去7天':'过去30天'}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
async function apiGetRetry(path,params={},tries=3){
  let last;
  for(let i=0;i<tries;i++){
    try{
      const r=await bridge.apiGet(path,params);
      if(r&&r.ok===false) throw new Error(r.error||'接口暂不可用');
      return r;
    }catch(e){
      last=e;
      if(i<tries-1) await sleep(350*(i+1));
    }
  }
  throw last;
}
async function apiPostRetry(path,body={},tries=2){
  let last;
  for(let i=0;i<tries;i++){
    try{
      const r=await bridge.apiPost(path,body);
      if(r&&r.ok===false) throw new Error(r.error||'接口暂不可用');
      return r;
    }catch(e){
      last=e;
      if(i<tries-1) await sleep(450*(i+1));
    }
  }
  throw last;
}
async function load(tab=currentTab){
  status('加载中...','loading');
  document.body.classList.add('is-loading');
  const cached=dataCache.get(tab);
  const chatKey=modelCacheKey(tab,modelScope);
  const allKey=modelCacheKey(tab,'all');
  if(cached && modelStatsCache.has(chatKey) && modelStatsCache.has(allKey)){
    rows=cached.rows; trendRows=cached.trendRows;
    modelRows=modelStatsCache.get(chatKey)||[];
    allModelRows=modelStatsCache.get(allKey)||[];
    $('subtitle').textContent=cached.subtitle;
    renderAll(); status('已切换','ok');
    document.body.classList.remove('is-loading');
    return;
  }
  try{
    const [d,tr,mr,amr]=await Promise.all([
      apiGetRetry('page/stats',{bucket_type:tab}),
      apiGetRetry('page/trend',{bucket_type:tab}).catch(()=>({rows:[]})),
      apiGetRetry('page/model_stats',{bucket_type:tab,scope:modelScope}).catch(()=>({rows:[]})),
      apiGetRetry('page/model_stats',{bucket_type:tab,scope:'all'}).catch(()=>({rows:[]}))
    ]);
    rows=(d.rows||[]).sort((a,b)=>(b.total_tokens||0)-(a.total_tokens||0)); trendRows=tr.rows||[]; modelRows=mr.rows||[]; allModelRows=amr.rows||[];
    const subtitle=`${d.window_label||tabName(tab)} · 共 ${rows.length} 个会话`;
    dataCache.set(tab,{rows,trendRows,subtitle});
    modelStatsCache.set(chatKey,modelRows);
    modelStatsCache.set(allKey,allModelRows);
    $('subtitle').textContent=subtitle;
    renderAll(); status('已加载','ok');
  }catch(e){status('加载失败: '+(e&&e.message?e.message:e),'err')}
  finally{document.body.classList.remove('is-loading')}
}
async function loadModelStats({force=false}={}){
  const key=modelCacheKey(currentTab,modelScope);
  if(!force && modelStatsCache.has(key)){
    modelRows=modelStatsCache.get(key)||[];
    if(modelScope==='all'){allModelRows=modelRows}
    renderModelDonut();
    status('已切换','ok');
    return;
  }
  status('加载模型...','loading');
  try{
    const mr=await apiGetRetry('page/model_stats',{bucket_type:currentTab,scope:modelScope}).catch(()=>({rows:[]}));
    modelRows=mr.rows||[];
    modelStatsCache.set(key,modelRows);
    if(modelScope==='all'){allModelRows=modelRows}
    renderModelDonut();
    status('已加载','ok');
  }catch(e){status('模型加载失败: '+(e&&e.message?e.message:e),'err')}
}
function renderAll(){renderCards();renderTopBars();renderDonut();renderModelDonut();renderTrend();renderTable()}
function renderCards(){
  const totalRounds=sum(rows,'round_count');
  const platforms=new Set(rows.map(r=>r.platform_id)).size;
  const modelSource=(allModelRows&&allModelRows.length)?allModelRows:modelRows;
  const tokenModelSource=modelSource.filter(r=>Number(r.total_tokens||0)>0);
  const allModelCalls=sum(tokenModelSource,'call_count'), totalTok=sum(modelSource,'total_tokens'), input=sum(modelSource,'input_tokens'), output=sum(modelSource,'output_tokens');
  $('summary').innerHTML=[
    ['会话数',rows.length,'当前周期记录数'],['总轮数',fmt(totalRounds),'Bot 回复轮次'],['全部模型总 Token',fmt(totalTok),`${fmt(allModelCalls)} 次有 Token 调用`],['全部模型输入 Token',fmt(input),'Prompt 消耗'],['全部模型输出 Token',fmt(output),`输出 · 平台数 ${platforms}`]
  ].map(([lab,val,h])=>`<div class="card"><div class="lab">${lab}</div><div class="val">${val}</div><div class="hint">${h}</div></div>`).join('')
}
function renderTopBars(){
  const metric=topMetric==='round_count'?'round_count':'total_tokens';
  const metricLabel=metric==='round_count'?'轮':'Token';
  const top=rows.slice().sort((a,b)=>Number(b[metric]||0)-Number(a[metric]||0)).slice(0,10), max=Math.max(1,...top.map(r=>r[metric]||0));
  $('topHint').textContent=`按 ${metricLabel} 排序 · 前 10`;
  $('topBars').innerHTML=top.length?`<div class="bars">${top.map((r,i)=>`<div class="bar-row"><div class="sid-cell"><div class="sid" tabindex="0">${esc(r.session_id)}</div></div><div class="track"><div class="fill" style="width:${Math.max(2,(r[metric]||0)/max*100)}%;animation-delay:${0.04+i*0.035}s"></div></div><div class="num">${fmt(r[metric])} ${metricLabel}</div></div>`).join('')}</div>`:'<div class="empty">暂无数据</div>'
}
function donutCSS(entries,total,colors){
  const valid=entries.map(e=>[e[0],Number(e[1]||0)]).filter(e=>e[1]>0);
  if(!valid.length) return 'conic-gradient(var(--primary) 0deg 360deg)';
  let deg=0;
  const parts=[];
  valid.forEach((e,i)=>{
    const next=deg+(e[1]/Math.max(1,total))*360;
    const color=colors[i%colors.length];
    parts.push(`${color} ${deg.toFixed(3)}deg ${next.toFixed(3)}deg`);
    deg=next;
  });
  if(deg<360) parts.push(`${colors[(valid.length-1)%colors.length]} ${deg.toFixed(3)}deg 360deg`);
  return `conic-gradient(${parts.join(',')})`;
}
function donutRoundSVG(entries,total,colors){
  // 直线空白间隙版：保留色块之间的白色缝隙，但彻底取消圆角。
  // 不再使用圆角矩形裁刀，也不再用描边补偿，避免任何外凸尖角或“被咬”的视觉问题。
  const size=210,cx=105,cy=105;
  const R_out=90,R_in=52;
  const R_mid=(R_out+R_in)/2;

  const gapPx=3.5;                  // 标准物理缝隙宽度（收窄到 3.5px）
  const minArcForFullGap=16;         // 小于该中心弧长时启用小色块保护
  const minVisibleArc=6;             // 极小色块至少保留的中心线可见弧长
  const minGapPx=1;                  // 小色块保护时的最小缝隙

  const valid=entries.map(e=>[e[0],Number(e[1]||0),e[2]]).filter(e=>e[1]>0);
  if(!valid.length) return '';
  const toXY=(r,a)=>[cx+r*Math.cos(a),cy+r*Math.sin(a)];

  const ringD = `M ${cx} ${(cy - R_out).toFixed(2)} ` +
                `A ${R_out} ${R_out} 0 1 1 ${cx} ${(cy + R_out).toFixed(2)} ` +
                `A ${R_out} ${R_out} 0 1 1 ${cx} ${(cy - R_out).toFixed(2)} ` +
                `M ${cx} ${(cy - R_in).toFixed(2)} ` +
                `A ${R_in} ${R_in} 0 1 0 ${cx} ${(cy + R_in).toFixed(2)} ` +
                `A ${R_in} ${R_in} 0 1 0 ${cx} ${(cy - R_in).toFixed(2)} Z`;

  if(valid.length===1){
    return `<svg class="donut-svg" viewBox="0 0 ${size} ${size}" width="100%" height="100%" preserveAspectRatio="xMidYMid meet"><path class="donut-arc" d="${ringD}" fill="${colors[0]}" fill-rule="evenodd"/></svg>`;
  }

  const totalValue=Math.max(1,total);
  const parts=[];
  let angle=-Math.PI/2;
  valid.forEach((e,i)=>{
    const span=e[1]/totalValue*Math.PI*2;
    parts.push({i,a0:angle,a1:angle+span,span,arc:span*R_mid,color:colors[i%colors.length]});
    angle+=span;
  });

  const sectors=parts.map((part)=>{
    const {a0,a1,span,color,i}=part;
    const [x1,y1]=toXY(R_out,a0);
    const [x2,y2]=toXY(R_out,a1);
    const [x3,y3]=toXY(R_in,a1);
    const [x4,y4]=toXY(R_in,a0);
    const large=span>Math.PI?1:0;
    const d=`M ${x1.toFixed(2)} ${y1.toFixed(2)} `+
            `A ${R_out} ${R_out} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} `+
            `L ${x3.toFixed(2)} ${y3.toFixed(2)} `+
            `A ${R_in} ${R_in} 0 ${large} 0 ${x4.toFixed(2)} ${y4.toFixed(2)} Z`;
    return `<path class="donut-arc" d="${d}" fill="${color}" style="animation-delay:${0.12+i*0.10}s"/>`;
  }).join('');

  const gapForBoundary=(left,right)=>{
    const minNeighbor=Math.min(left.arc,right.arc);
    if(minNeighbor>=minArcForFullGap) return gapPx;
    const safeGap=(minNeighbor-minVisibleArc)/2;
    return Math.min(gapPx, Math.max(minGapPx, safeGap));
  };

  // 生成沿半径方向的直线矩形裁刀：没有圆角，只有笔直空白间隙。
  // bleed 让裁刀略微越过内外圆边缘，消掉 SVG 抗锯齿在外侧留下的一丝彩边。
  const straightRadialCut=(a,w)=>{
    const h=w/2;
    const bleed=4;
    const ux=Math.cos(a), uy=Math.sin(a);
    const tx=-Math.sin(a), ty=Math.cos(a);
    const P=(rad,off)=>[cx+ux*rad+tx*off, cy+uy*rad+ty*off];
    const p1=P(R_in-bleed,-h);
    const p2=P(R_in-bleed,h);
    const p3=P(R_out+bleed,h);
    const p4=P(R_out+bleed,-h);
    const xy=(p)=>`${p[0].toFixed(2)} ${p[1].toFixed(2)}`;
    return `M ${xy(p1)} L ${xy(p2)} L ${xy(p3)} L ${xy(p4)} Z`;
  };

  const maskId=`donut-mask-${Math.random().toString(36).slice(2)}`;
  const revealCirc=(Math.PI*2*R_mid).toFixed(2);
  const revealStroke=(R_out-R_in+10).toFixed(2);
  const cuts=parts.map((part,idx)=>{
    const prev=parts[(idx-1+parts.length)%parts.length];
    const localGap=gapForBoundary(prev,part);
    return `<path d="${straightRadialCut(part.a0,localGap)}" fill="black"/>`;
  }).join('');

  return `<svg class="donut-svg" viewBox="0 0 ${size} ${size}" width="100%" height="100%" preserveAspectRatio="xMidYMid meet"><defs><mask id="${maskId}"><rect x="0" y="0" width="${size}" height="${size}" fill="black"/><circle class="donut-reveal-stroke" cx="${cx}" cy="${cy}" r="${R_mid}" fill="none" stroke="white" stroke-width="${revealStroke}" transform="rotate(-90 ${cx} ${cy})" style="--donut-circ:${revealCirc}"/>${cuts}</mask></defs><g mask="url(#${maskId})">${sectors}</g></svg>`;
}
function donutSVG(entries,total,colors){
  const size=210,cx=105,cy=105;
  const R_out = 90;
  const R_in = 60;
  const targetGap = 6; // 6px 缝隙
  const valid=entries.map(e=>[e[0],Number(e[1]||0)]).filter(e=>e[1]>0);
  const paths=[];
  const toXY=(r,a)=>[cx+r*Math.cos(a),cy+r*Math.sin(a)];

  // 求解 r：已知 R_out、R_in，给定 cap_ang_half (phi 收缩量，弧度)，
  // 求内接于内圆 r_in、外切于外圆 r_out 的最大圆角半径 r
  // 迭代求 r：
  function solveR(cap_ang_half, R_out, R_in){
    if(cap_ang_half <= 0.001) return 0;
    let r = 0.5;
    for(let i=0; i<20; i++){
      const maxR = Math.min(R_out/2 - 0.5, R_in/2 - 0.5);
      if(r > maxR) r = maxR;
      if(r < 0.1) r = 0.1;
      const sinOut = r / (R_out - r);
      const sinIn = r / (R_in + r);
      if(sinOut >= 1 || sinIn >= 1){
        r = maxR;
        continue;
      }
      const daOut = Math.asin(sinOut);
      const daIn = Math.asin(sinIn);
      const total = daOut + daIn;
      if(Math.abs(total - cap_ang_half) < 0.001) return r;
      r = r * (cap_ang_half / Math.max(0.0001, total));
      if(r < 0) r = 0.1;
    }
    return r;
  }

  if(valid.length===1){
    const d = `M ${cx} ${(cy - R_out).toFixed(2)} ` +
              `A ${R_out} ${R_out} 0 1 1 ${cx} ${(cy + R_out).toFixed(2)} ` +
              `A ${R_out} ${R_out} 0 1 1 ${cx} ${(cy - R_out).toFixed(2)} ` +
              `M ${cx} ${(cy - R_in).toFixed(2)} ` +
              `A ${R_in} ${R_in} 0 1 0 ${cx} ${(cy + R_in).toFixed(2)} ` +
              `A ${R_in} ${R_in} 0 1 0 ${cx} ${(cy - R_in).toFixed(2)} Z`;
    paths.push(`<path class="donut-arc" d="${d}" fill="${colors[0]}"/>`);
    return `<svg class="donut-svg" viewBox="0 0 ${size} ${size}" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">${paths.join('')}</svg>`;
  }
  let angle=-Math.PI/2;
    valid.forEach((e,i)=>{
      const span=(e[1]/total)*Math.PI*2;
      const color = colors[i%colors.length];
      
      // 目标缝隙在中心线处
      // 缝隙总角度 = theta_g = targetGap / R_m (其中 R_m 是中线)
      // 缝隙两侧各占一半 theta_g / 2
      // 分块可用角 = span - theta_g
      // 两端各 cap_ang_half = (span - theta_g) / 2
      // 使用 solveR 求解精确的圆角半径 r
      const theta_g = targetGap / ((R_out + R_in) / 2);
      const cap_ang_half = Math.max(0, (span - theta_g) / 2);
      
      const r = solveR(cap_ang_half, R_out, R_in);
      
      // 计算内外圈角度偏移
      let daOut = 0, daIn = 0;
      if(r > 0.01){
        daOut = Math.asin(Math.min(1, r / (R_out - r)));
        daIn = Math.asin(Math.min(1, r / (R_in + r)));
      }
      
      // 应用几何收缩
      // 外圈角度 phi_0..phi_1，偏移 daOut
      // 内圈角度 phi_0..phi_1，偏移 daIn
      // 圆心 r 半径的圆角中心角度 = phi + daOut (外) 或 phi - daIn (内)
      // 简单起见：圆角中心位于 phi_0 + daOut，phi_1 - daOut (外圈用 daOut 更准确)
      // 实际上圆角中心在 (R_out, phi + daOut) 处近似
      
      const phi0 = angle + theta_g / 2;
      const phi1 = angle + span - theta_g / 2;
      
      if(span < theta_g){
        // span 太小，连缝隙都塞不下，那就画一个小的弧形楔子（不带圆角，0 描边）
        // 用 r=0 即可
        const a0_out_w = phi0;
        const a1_out_w = phi1;
        const a1_in_w = phi1;
        const a0_in_w = phi0;
        const [wx1, wy1] = toXY(R_out, a0_out_w);
        const [wx2, wy2] = toXY(R_out, a1_out_w);
        const [wx3, wy3] = toXY(R_in, a1_in_w);
        const [wx4, wy4] = toXY(R_in, a0_in_w);
        const wd = `M ${wx1.toFixed(2)} ${wy1.toFixed(2)} ` +
                  `A ${R_out.toFixed(2)} ${R_out.toFixed(2)} 0 0 1 ${wx2.toFixed(2)} ${wy2.toFixed(2)} ` +
                  `L ${wx3.toFixed(2)} ${wy3.toFixed(2)} ` +
                  `A ${R_in.toFixed(2)} ${R_in.toFixed(2)} 0 0 0 ${wx4.toFixed(2)} ${wy4.toFixed(2)} Z`;
        paths.push(`<path class="donut-arc" d="${wd}" fill="${color}" style="animation-delay:${0.12+i*0.10}s"/>`);
      } else {
        // 圆角连接点
        // 外圈入点
        const a0_out = phi0 + daOut;
        const a1_out = phi1 - daOut;
        // 内圈出点
        const a1_in = phi1 - daIn;
        const a0_in = phi0 + daIn;
        
        // 计算连接线终点 (直线段)
        // 外圈出点
        const [x1, y1] = toXY(R_out, a0_out);
        const [x2, y2] = toXY(R_out, a1_out);
        // 内圈入点
        const [x3, y3] = toXY(R_in, a1_in);
        const [x4, y4] = toXY(R_in, a0_in);
        
        // 圆角中心
        // 圆角中心在 (R_out - r, a) 附近? 
        // 实际是：外圈到内圈的连接是斜线，圆角是斜线和圆弧的过渡
        // 圆角中心 (R_out - r, phi) 和 (R_in + r, phi) 不是圆心，因为内外圈半径不同
        // 正确的圆角中心：连接斜线两端 (R_out, phi + daOut) 和 (R_in, phi + daIn)，
        // 与外圆相切、与内圆相切的圆。
        // 切点处径向方向是 (cos(phi+daOut), sin(phi+daOut)) 和 (cos(phi+daIn), sin(phi+daIn))
        // 圆心 = 切点 + r * 径向方向
        const c1 = [x1 + r * Math.cos(a0_out), y1 + r * Math.sin(a0_out)];
        const c2 = [x2 + r * Math.cos(a1_out), y2 + r * Math.sin(a1_out)];
        const c3 = [x3 - r * Math.cos(a1_in), y3 - r * Math.sin(a1_in)];
        const c4 = [x4 - r * Math.cos(a0_in), y4 - r * Math.sin(a0_in)];
        
        const large_arc_out = (a1_out - a0_out) > Math.PI ? 1 : 0;
        const large_arc_in = (a1_in - a0_in) > Math.PI ? 1 : 0;
        
        // 路径: 外圆弧 -> 直线到内圈出点 -> 内圆弧(反向) -> 直线到外圈入点 -> 圆角回到起点
        // 但我们想要圆角连接，所以是：
        // 外圆弧 (phi0+daOut -> phi1-daOut) -> 圆角到内圈出点 (phi1-daIn) -> 内圆弧反向 -> 圆角到外圈入点
        const sweepOut = 1; // 顺时针
        const sweepIn = 0; // 逆时针
        // 圆角的扫掠方向：从外到内，是顺时针(1)；从内到外，也是顺时针(1)
        const d = `M ${x1.toFixed(2)} ${y1.toFixed(2)} ` +
                  `A ${R_out.toFixed(2)} ${R_out.toFixed(2)} 0 ${large_arc_out} ${sweepOut} ${x2.toFixed(2)} ${y2.toFixed(2)} ` +
                  `A ${r.toFixed(2)} ${r.toFixed(2)} 0 0 1 ${x3.toFixed(2)} ${y3.toFixed(2)} ` +
                  `A ${R_in.toFixed(2)} ${R_in.toFixed(2)} 0 ${large_arc_in} ${sweepIn} ${x4.toFixed(2)} ${y4.toFixed(2)} ` +
                  `A ${r.toFixed(2)} ${r.toFixed(2)} 0 0 1 ${x1.toFixed(2)} ${y1.toFixed(2)}`;
        
        paths.push(`<path class="donut-arc" d="${d}" fill="${color}" style="animation-delay:${0.12+i*0.10}s"/>`);
      }
      angle+=span;
    });
  return `<svg class="donut-svg" viewBox="0 0 ${size} ${size}" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">${paths.join('')}</svg>`;
}
function renderDonut(){
  if(!rows.length){$('platformDonut').innerHTML='<div class="empty">暂无数据</div>';return}
  const metric=platformMetric==='round_count'?'round_count':'total_tokens';
  const metricLabel=metric==='round_count'?'轮':'Token';
  const otherMetric=metric==='round_count'?'total_tokens':'round_count';
  const otherLabel=metric==='round_count'?'Token':'轮数';
  const map={}, detail={};
  rows.forEach(r=>{
    const pid=String(r.platform_id||'unknown');
    map[pid]=(map[pid]||0)+Number(r[metric]||0);
    const d=detail[pid]||(detail[pid]={round_count:0,total_tokens:0,session_count:0});
    d.round_count+=Number(r.round_count||0);
    d.total_tokens+=Number(r.total_tokens||0);
    d.session_count+=1;
  });
  const allEntries=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const entries=allEntries.slice(0,2);
  const total=Math.max(1,entries.reduce((s,x)=>s+x[1],0));
  const [mainPlatform,mainValue]=entries[0]||['-',0];
  const mainDetail=detail[mainPlatform]||{round_count:0,total_tokens:0,session_count:0};
  const share=(mainValue/total*100).toFixed(1);
  const hiddenPlatforms=Math.max(0,allEntries.length-entries.length);
  const summaryTip=allEntries.length===1
    ? `当前周期仅检测到 ${esc(mainPlatform)} 平台数据。`
    : `当前仅展示前 ${entries.length} 个平台${hiddenPlatforms?`，已隐藏 ${hiddenPlatforms} 个平台`:''}。主力平台 ${esc(mainPlatform)} 占当前展示 ${share}% 的${metricLabel}。`;
  const svg=donutRoundSVG(entries,total,colors);
  $('platformDonut').innerHTML=`<div class="donut-wrap"><div class="donut donut-svg-wrap">${svg}</div><div class="legend">${entries.map(([k,v],i)=>`<div class="legend-item" style="animation-delay:${0.08+i*0.035}s"><span class="dot" style="background:${colors[i%colors.length]}"></span><span style="flex:1">${esc(k)}</span><b>${fmt(v)} ${metricLabel}</b><span>${(v/total*100).toFixed(1)}%</span></div>`).join('')}<div class="platform-summary"><div class="headline"><div><div class="label">主力平台</div><div class="main" title="${esc(mainPlatform)}">${esc(mainPlatform)}</div></div><div class="share">${share}%</div></div><div class="stats"><div class="stat"><span>${metricLabel}</span><b>${fmt(mainDetail[metric])}</b></div><div class="stat"><span>${otherLabel}</span><b>${fmt(mainDetail[otherMetric])}</b></div></div><div class="tip">${summaryTip} · 覆盖 ${fmt(mainDetail.session_count)} 个会话。</div></div></div></div>`
}
function renderModelDonut(){
  const metric=modelMetric==='call_count'?'call_count':'total_tokens';
  const metricLabel=metric==='call_count'?'次':'Token';
  const raw=(modelRows||[]).slice();
  const hiddenZeroToken=metric==='total_tokens'?raw.filter(r=>Number(r.total_tokens||0)<=0).length:0;
  const data=raw
    .filter(r=>metric!=='total_tokens'||Number(r.total_tokens||0)>0)
    .sort((a,b)=>Number(b[metric]||0)-Number(a[metric]||0));
  $('modelHint').textContent=data.length
    ? `按 ${metricLabel} 排序 · ${data.length} 个模型${hiddenZeroToken?` · 已隐藏 ${hiddenZeroToken} 个 0 Token 模型`:''}`
    : (metric==='total_tokens'&&raw.length?`暂无有 Token 的模型数据 · 已隐藏 ${hiddenZeroToken} 个 0 Token 模型`:'暂无模型数据');
  if(!data.length){$('modelDonut').innerHTML=`<div class="empty">${metric==='total_tokens'&&raw.length?'暂无有 Token 的模型统计':'暂无模型统计数据'}<br><small>${metric==='total_tokens'&&raw.length?'嵌入/重排等 0 Token 调用不会显示在 Token 占比中':(modelScope==='all'?'走 AstrBot Provider 的调用会写入全部模型统计':'重载插件后，新回复会开始写入对话模型统计')}</small></div>`;return}
  const top=data.slice(0,8);
  const tail=data.slice(8);
  const rest=tail.reduce((s,r)=>s+Number(r[metric]||0),0);
  const entries=top.map(r=>[`${r.model_name||'unknown'}${r.provider_name&&r.provider_name!=='unknown'?' · '+r.provider_name:''}`,Number(r[metric]||0),r]);
  if(rest>0){
    const others=tail
      .map(r=>({
        name:`${r.model_name||'unknown'}${r.provider_name&&r.provider_name!=='unknown'?' · '+r.provider_name:''}`,
        value:Number(r[metric]||0)
      }))
      .sort((a,b)=>b.value-a.value);
    entries.push(['其他',rest,{__others:others}]);
  }
  const total=Math.max(1,entries.reduce((s,x)=>s+x[1],0));
  const svg=donutRoundSVG(entries,total,colors);
  $('modelDonut').innerHTML=`<div class="donut-wrap"><div class="donut donut-svg-wrap">${svg}${entries.length===1?'<div class="donut-center-label" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);pointer-events:none;z-index:1">100%</div>':''}</div><div class="legend">${entries.map(([k,v,r],i)=>{
    const others=r&&r.__others?r.__others:null;
    const othersAttr=others?` data-others='${esc(JSON.stringify({items:others,metric:metricLabel}))}'`:"";
    return `<div class="legend-item${others?' has-others':''}" style="animation-delay:${0.08+i*0.035}s"${othersAttr}><span class="dot" style="background:${colors[i%colors.length]}"></span><span style="flex:1" title="${esc(k)}">${esc(k)}${others?` <span class="others-hint" title="悬停查看被折叠的模型">▾</span>`:''}</span><b>${fmt(v)} ${metricLabel}</b><span>${(v/total*100).toFixed(1)}%</span></div>`
  }).join('')}</div></div>`;
  bindOthersHover();
}
function compact(n){
  n=Number(n||0);
  if(n>=1e9)return (n/1e9).toFixed(2).replace(/\.00$/,'')+'B';
  if(n>=1e6)return (n/1e6).toFixed(2).replace(/\.00$/,'')+'M';
  if(n>=1e3)return (n/1e3).toFixed(1).replace(/\.0$/,'')+'K';
  return fmt(Math.round(n));
}
function smoothPath(pts){
  if(!pts.length)return '';
  if(pts.length===1)return `M ${pts[0][0]} ${pts[0][1]}`;
  let d=`M ${pts[0][0]} ${pts[0][1]}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||p2;
    const cp1x=p1[0]+(p2[0]-p0[0])/6, cp1y=p1[1]+(p2[1]-p0[1])/6;
    const cp2x=p2[0]-(p3[0]-p1[0])/6, cp2y=p2[1]-(p3[1]-p1[1])/6;
    d+=` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2[0]} ${p2[1]}`;
  }
  return d;
}
function renderTrend(){
  const data=trendRows.length?trendRows:[];
  const metric=trendMetric==='round_count'?'round_count':'total_tokens';
  const metricLabel=metric==='round_count'?'轮数':'Token';
  const metricUnit=metric==='round_count'?'轮':'Token';
  const bucketLabel=currentTab==='day'?'过去24小时 · 每小时':(currentTab==='week'?'过去7天 · 每日':'过去30天 · 每日');
  $('trendHint').textContent=data.length?`${bucketLabel} · 按 ${metricLabel} · ${data.length} 个刻度`:`${bucketLabel} · 暂无趋势`;
  if(!data.length){$('trend').innerHTML='<div class="empty">暂无趋势数据</div>';return}

  const chartEl=$('trend');
  const W=Math.max(760,Math.round(chartEl.clientWidth||980));
  const H=Math.max(260,Math.round(chartEl.clientHeight||280));
  const padL=70,padR=34,padT=24,padB=42;
  const values=data.map(r=>Number(r[metric]||0));
  const maxRaw=Math.max(1,...values);
  const magnitude=Math.pow(10,Math.floor(Math.log10(maxRaw)));
  const niceStep=Math.max(1,Math.ceil(maxRaw/4/magnitude)*magnitude);
  const max=Math.max(niceStep*4,maxRaw);
  const yTicks=[0,1,2,3,4].map(i=>i*max/4);
  const x0=padL,x1=W-padR,y0=H-padB,y1=padT;
  const pts=data.map((r,i)=>[
    x0+(x1-x0)*(data.length===1?.5:i/(data.length-1)),
    y0-(y0-y1)*Number(r[metric]||0)/max
  ]);
  const linePath=smoothPath(pts);
  const areaPath=`M ${x0} ${y0} L ${pts[0][0]} ${pts[0][1]} ${linePath.replace(/^M [^CML]+ [^CML]+/,'')} L ${pts[pts.length-1][0]} ${y0} Z`;
  const xLabelEvery=Math.max(1,Math.ceil(data.length/7));
  const last=pts[pts.length-1], lastVal=values[values.length-1];
  const avg=values.reduce((a,b)=>a+b,0)/Math.max(1,values.length);
  const peak=Math.max(...values);
  const peakIdx=values.indexOf(peak);

  $('trend').innerHTML=`<div class="trend-wrap"><div class="trend-tip" id="trendTip"></div><svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="font-family:'SF Pro Display','SF Pro Text',Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <defs>
      <linearGradient id="trendArea" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="var(--primary)" stop-opacity=".20"/>
        <stop offset=".68" stop-color="var(--primary2)" stop-opacity=".07"/>
        <stop offset="1" stop-color="var(--primary)" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="trendLine" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="var(--primary2)"/>
        <stop offset="1" stop-color="var(--primary)"/>
      </linearGradient>
      <filter id="trendGlow" x="-20%" y="-40%" width="140%" height="180%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.10 0 0 0 0 0.46 0 0 0 0 0.82 0 0 0 .26 0"/>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <rect x="0" y="0" width="${W}" height="${H}" fill="transparent"/>
    <g stroke="var(--border)" stroke-width="1">
      ${yTicks.map(v=>{const y=y0-(y0-y1)*v/max;return `<line x1="${x0}" x2="${x1}" y1="${y}" y2="${y}" opacity=".82"/>`}).join('')}
    </g>
    <g fill="var(--muted)" font-size="11" font-variant-numeric="tabular-nums">
      ${yTicks.map(v=>{const y=y0-(y0-y1)*v/max+4;return `<text x="${x0-12}" y="${y}" text-anchor="end">${compact(v)}</text>`}).join('')}
    </g>
    <path class="trend-area" d="${areaPath}" fill="url(#trendArea)"/>
    <path class="trend-line" pathLength="1" d="${linePath}" fill="none" stroke="url(#trendLine)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#trendGlow)"/>
    <path class="trend-line" pathLength="1" d="${linePath}" fill="none" stroke="var(--primary)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity=".95"/>
    <line x1="${x0}" x2="${x1}" y1="${y0}" y2="${y0}" stroke="var(--border)"/>
    <g fill="var(--muted)" font-size="11">
      ${data.map((r,i)=>i%xLabelEvery===0||i===data.length-1?`<text x="${pts[i][0]}" y="${H-12}" text-anchor="middle">${esc(r.bucket_key)}</text>`:'').join('')}
    </g>
    <g>
      ${pts.map((p,i)=>`<circle class="trend-hit" cx="${p[0]}" cy="${p[1]}" r="14" fill="transparent" data-i="${i}"></circle><circle class="trend-dot" cx="${p[0]}" cy="${p[1]}" r="3" fill="var(--surface)" stroke="var(--primary)" stroke-width="2" style="animation-delay:${0.28+i*0.018}s"></circle>`).join('')}
    </g>
    <g>
      <circle class="trend-mark" cx="${pts[peakIdx][0]}" cy="${pts[peakIdx][1]}" r="5" fill="var(--primary)" opacity=".95"/>
      <text x="${pts[peakIdx][0]}" y="${Math.max(14,pts[peakIdx][1]-12)}" text-anchor="middle" fill="var(--primary)" font-size="11" font-weight="650">峰值 ${compact(peak)}</text>
      <circle class="trend-mark" cx="${last[0]}" cy="${last[1]}" r="5" fill="var(--surface)" stroke="var(--primary)" stroke-width="2.5"/>
      <rect x="${Math.min(last[0]-44,W-108)}" y="${Math.max(8,last[1]-34)}" width="88" height="24" rx="12" fill="var(--soft)" stroke="var(--border)"/>
      <text x="${Math.min(last[0],W-64)}" y="${Math.max(24,last[1]-18)}" text-anchor="middle" fill="var(--primary)" font-size="11" font-weight="650">${compact(lastVal)} ${metricUnit}</text>
    </g>
    <text x="${x1}" y="${padT}" text-anchor="end" fill="var(--subtle)" font-size="11">均值 ${compact(avg)} ${metricUnit}</text>
  </svg></div>`;

  const wrap=$('trend').querySelector('.trend-wrap');
  const tip=$('trendTip');
  wrap.querySelectorAll('.trend-hit').forEach(hit=>{
    hit.addEventListener('mousemove',e=>{
      const i=Number(hit.dataset.i), r=data[i], p=pts[i];
      tip.innerHTML=`<b>${esc(r.bucket_key)}</b><br>${fmt(r[metric])} ${metricUnit}${metric==='total_tokens'?` · ${fmt(r.round_count)} 轮`:` · ${fmt(r.total_tokens)} Token`}`;
      tip.style.left=(p[0]/W*100)+'%';
      tip.style.top=(p[1]/H*100)+'%';
      tip.style.opacity='1';
    });
    hit.addEventListener('mouseleave',()=>{tip.style.opacity='0'});
  });
}
function filtered(){const q=query.trim().toLowerCase();return q?rows.filter(r=>String(r.platform_id).toLowerCase().includes(q)||String(r.session_id).toLowerCase().includes(q)):rows}
function tableSortLabel(){return tableSortMetric==='round_count'?'轮数':'Token'}
function sortedTableRows(){
  const dir=tableSortDir==='asc'?1:-1;
  return filtered().slice().sort((a,b)=>{
    const av=Number(a[tableSortMetric]||0), bv=Number(b[tableSortMetric]||0);
    if(av!==bv) return (av-bv)*dir;
    return Number(b.total_tokens||0)-Number(a.total_tokens||0);
  });
}
function updateTableSortButtons(){
  document.querySelectorAll('#tableSortSwitch button').forEach(b=>{
    const on=b.dataset.sort===tableSortMetric;
    b.classList.toggle('on',on);
    const base=b.dataset.sort==='round_count'?'轮数':'Token';
    b.textContent=on?`${base} ${tableSortDir==='asc'?'↑':'↓'}`:base;
  });
}
let _othersPop=null;
function ensureOthersPop(){
  if(_othersPop) return _othersPop;
  const el=document.createElement('div');
  el.className='others-pop';
  el.style.cssText='position:fixed;z-index:50;min-width:220px;max-width:320px;max-height:240px;overflow-y:auto;padding:10px 12px;border-radius:10px;background:var(--surface);border:1px solid var(--border-strong);box-shadow:0 8px 24px rgba(0,0,0,.12);font-size:12.5px;line-height:1.6;color:var(--fg);display:none;pointer-events:none;backdrop-filter:blur(6px)';
  document.body.appendChild(el);
  _othersPop=el;
  return el;
}
function bindOthersHover(){
  const els=document.querySelectorAll('#modelDonut .legend-item.has-others');
  els.forEach(item=>{
    let timer=null;
    const show=()=>{
      const pop=ensureOthersPop();
      let data={};
      try{data=JSON.parse(item.getAttribute('data-others')||'{}')}catch(e){}
      const metric=data.metric||'';
      const items=(data.items||[]);
      if(!items.length) return;
      const rows=items.map((it,idx)=>{
        const pct=it.value>0?((it.value/items.reduce((s,x)=>s+x.value,0))*100).toFixed(1):'0.0';
        return `<div style="display:flex;align-items:center;gap:8px;padding:2px 0"><span style="width:6px;height:6px;border-radius:999px;background:${colors[(idx)%colors.length]};flex-shrink:0"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(it.name)}">${esc(it.name)}</span><span style="color:var(--muted);font-variant-numeric:tabular-nums">${fmt(it.value)} ${metric}</span><span style="color:var(--subtle);min-width:42px;text-align:right">${pct}%</span></div>`;
      }).join('');
      pop.innerHTML=`<div style="font-weight:600;margin-bottom:6px;color:var(--muted)">被折叠的 ${items.length} 个模型</div>${rows}`;
      pop.style.display='block';
      const r=item.getBoundingClientRect();
      const popR=pop.getBoundingClientRect();
      const margin=10;
      let top=r.bottom+margin;
      if(top+popR.height>window.innerHeight-8){ top=Math.max(8,r.top-popR.height-margin); }
      let left=r.left;
      if(left+popR.width>window.innerWidth-8){ left=Math.max(8,window.innerWidth-popR.width-8); }
      pop.style.left=left+'px';
      pop.style.top=top+'px';
    };
    const hide=()=>{
      const pop=ensureOthersPop();
      pop.style.display='none';
    };
    item.onmouseenter=()=>{ clearTimeout(timer); show(); };
    item.onmouseleave=()=>{ timer=setTimeout(hide,80); };
    item.onfocus=show;
    item.onblur=hide;
    item.setAttribute('tabindex','0');
  });
}
function renderTable(){
  const data=sortedTableRows();
  updateTableSortButtons();
  $('tableHint').textContent=`${data.length} 条 · 按 ${tableSortLabel()} ${tableSortDir==='asc'?'升序':'降序'} · 最多显示 10 条，滚动查看更多`;
  $('table').innerHTML=`<thead><tr><th>平台</th><th>会话 ID</th><th class="right">轮数</th><th class="right">用户消息</th><th class="right">Bot 消息</th><th class="right">输入 Token</th><th class="right">输出 Token</th><th class="right">总 Token</th></tr></thead><tbody>${data.map((r,i)=>`<tr style="animation-delay:${Math.min(i,10)*0.018}s"><td>${esc(r.platform_id)}</td><td title="${esc(r.session_id)}">${esc(r.session_id)}</td><td class="right">${fmt(r.round_count)}</td><td class="right">${fmt(r.user_message_count)}</td><td class="right">${fmt(r.bot_message_count)}</td><td class="right">${fmt(r.input_tokens)}</td><td class="right">${fmt(r.output_tokens)}</td><td class="right"><b>${fmt(r.total_tokens)}</b></td></tr>`).join('')||`<tr><td colspan="8"><div class="empty">没有匹配的数据</div></td></tr>`}</tbody>`
}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');currentTab=b.dataset.t;load(currentTab)});
document.querySelectorAll('#platformMetricSwitch button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#platformMetricSwitch button').forEach(x=>x.classList.remove('on'));b.classList.add('on');platformMetric=b.dataset.m;renderDonut()});
document.querySelectorAll('#modelScopeSwitch button').forEach(b=>b.onclick=async()=>{document.querySelectorAll('#modelScopeSwitch button').forEach(x=>x.classList.remove('on'));b.classList.add('on');modelScope=b.dataset.s;await loadModelStats()});
document.querySelectorAll('#modelMetricSwitch button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#modelMetricSwitch button').forEach(x=>x.classList.remove('on'));b.classList.add('on');modelMetric=b.dataset.m;renderModelDonut()});
document.querySelectorAll('#topMetricSwitch button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#topMetricSwitch button').forEach(x=>x.classList.remove('on'));b.classList.add('on');topMetric=b.dataset.m;renderTopBars()});
document.querySelectorAll('#trendMetricSwitch button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#trendMetricSwitch button').forEach(x=>x.classList.remove('on'));b.classList.add('on');trendMetric=b.dataset.m;renderTrend()});
document.querySelectorAll('#tableSortSwitch button').forEach(b=>b.onclick=()=>{const m=b.dataset.sort;if(tableSortMetric===m){tableSortDir=tableSortDir==='desc'?'asc':'desc'}else{tableSortMetric=m;tableSortDir='desc'}renderTable()});
$('btn-refresh').onclick=()=>{dataCache.clear();modelStatsCache.clear();load(currentTab)}; $('search').oninput=e=>{query=e.target.value;renderTable()};
let confirm=false,timer=null; $('btn-clear').onclick=async()=>{const btn=$('btn-clear'); if(!confirm){confirm=true;btn.textContent='再次点击确认清空';status('请再次点击确认清空','loading');clearTimeout(timer);timer=setTimeout(()=>{confirm=false;btn.textContent='清空数据';status('已取消清空确认','ok')},5000);return} confirm=false;clearTimeout(timer);btn.disabled=true;btn.textContent='清空中...';status('正在清空...','loading');try{const r=await apiPostRetry('page/clear',{});status('已清空，游标 '+(r?.last_message_id??'当前末尾'),'ok');await load(currentTab)}catch(e){status('清空失败: '+(e?.message||e),'err')}finally{btn.disabled=false;btn.textContent='清空数据'}};
bridge.ready().then(()=>load(currentTab));
</script>
